<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title description">
  <title id="title">iframe 요소 선택과 Inspector 동기화 흐름</title>
  <desc id="description">iframe 요소 클릭에서 store 선택 갱신, Preview 강조과 Inspector 중앙 스크롤까지의 흐름</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" />
    </marker>
    <style>
      .node { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .state { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .result { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .label { fill: #111827; font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .detail { fill: #374151; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .edge { fill: none; stroke: #6366f1; stroke-width: 2; marker-end: url(#arrow); }
      .edge-label { fill: #4b5563; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <rect class="node" x="35" y="55" width="205" height="88" rx="14" />
  <text class="label" x="137" y="89">사용자</text>
  <text class="detail" x="137" y="116">iframe 요소 클릭</text>

  <rect class="node" x="285" y="55" width="240" height="88" rx="14" />
  <text class="label" x="405" y="89">HtmlEditorPreview</text>
  <text class="detail" x="405" y="116">click 이벤트 수신</text>

  <rect class="node" x="570" y="55" width="260" height="88" rx="14" />
  <text class="label" x="700" y="89">useHtmlElementEditing</text>
  <text class="detail" x="700" y="116">요소 ID 확인 및 선택</text>

  <rect class="state" x="875" y="55" width="280" height="88" rx="14" />
  <text class="label" x="1015" y="89">Builder editor store</text>
  <text class="detail" x="1015" y="116">selectedElementId 갱신</text>

  <path class="edge" d="M 240 99 L 285 99" />
  <path class="edge" d="M 525 99 L 570 99" />
  <path class="edge" d="M 830 99 L 875 99" />

  <path class="edge" d="M 1015 143 L 1015 230 L 340 230 L 340 278" />
  <text class="edge-label" x="690" y="216">selectedElementId를 props로 동기화</text>

  <rect class="result" x="165" y="278" width="350" height="96" rx="14" />
  <text class="label" x="340" y="313">HtmlEditorPreview</text>
  <text class="detail" x="340" y="341">data-tcube-selected 강조</text>

  <rect class="result" x="685" y="278" width="350" height="96" rx="14" />
  <text class="label" x="860" y="313">HtmlEditorInspector</text>
  <text class="detail" x="860" y="341">활성 항목을 목록 중앙으로 스크롤</text>

  <path class="edge" d="M 1015 230 L 1015 250 L 860 250 L 860 278" />
</svg>
