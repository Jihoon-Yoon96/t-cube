<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="640" viewBox="0 0 1240 640" role="img" aria-labelledby="title desc">
  <title id="title">AI HTML 수정 채팅 요청과 취소 흐름</title>
  <desc id="desc">채팅 입력에서 Gemini 요청, 문서 반영까지의 흐름과 정지 및 화면 이동에 따른 요청 취소 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#818cf8"/>
    </marker>
    <marker id="cancel-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f87171"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 22px system-ui, sans-serif; }
      .label { fill: #f8fafc; font: 700 15px system-ui, sans-serif; }
      .detail { fill: #cbd5e1; font: 13px system-ui, sans-serif; }
      .note { fill: #a5b4fc; font: 600 13px system-ui, sans-serif; }
      .cancel-note { fill: #fca5a5; font: 600 13px system-ui, sans-serif; }
      .box { fill: #1e293b; stroke: #6366f1; stroke-width: 2; rx: 12; }
      .store { fill: #172554; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .server { fill: #312e81; stroke: #a78bfa; stroke-width: 2; rx: 12; }
      .cancel { fill: #3f1d2e; stroke: #f87171; stroke-width: 2; rx: 12; }
      .flow { fill: none; stroke: #818cf8; stroke-width: 2.5; marker-end: url(#arrow); }
      .cancel-flow { fill: none; stroke: #f87171; stroke-width: 2.5; stroke-dasharray: 7 5; marker-end: url(#cancel-arrow); }
    </style>
  </defs>

  <rect width="1240" height="640" rx="18" fill="#0f172a"/>
  <text x="40" y="48" class="title">AI HTML 수정 요청</text>

  <rect x="40" y="85" width="190" height="92" class="box"/>
  <text x="135" y="119" text-anchor="middle" class="label">HtmlEditorAiChat</text>
  <text x="135" y="145" text-anchor="middle" class="detail">프롬프트 입력 · 전송</text>

  <rect x="290" y="85" width="210" height="92" class="box"/>
  <text x="395" y="119" text-anchor="middle" class="label">useHtmlEditChat</text>
  <text x="395" y="145" text-anchor="middle" class="detail">HTML 직렬화 · 요청 상태</text>

  <rect x="560" y="85" width="210" height="92" class="server"/>
  <text x="665" y="119" text-anchor="middle" class="label">html-edit-chat API</text>
  <text x="665" y="145" text-anchor="middle" class="detail">입력 검증 · abort 연결</text>

  <rect x="830" y="85" width="170" height="92" class="server"/>
  <text x="915" y="119" text-anchor="middle" class="label">Gemini</text>
  <text x="915" y="145" text-anchor="middle" class="detail">전체 HTML 수정</text>

  <path d="M230 131 H290" class="flow"/>
  <path d="M500 131 H560" class="flow"/>
  <path d="M770 131 H830" class="flow"/>
  <text x="260" y="116" text-anchor="middle" class="note">send</text>
  <text x="530" y="116" text-anchor="middle" class="note">fetch</text>

  <path d="M915 177 V245 H665" class="flow"/>
  <rect x="560" y="245" width="210" height="92" class="server"/>
  <text x="665" y="279" text-anchor="middle" class="label">응답 검증</text>
  <text x="665" y="305" text-anchor="middle" class="detail">message · html · warnings</text>

  <rect x="290" y="245" width="210" height="92" class="box"/>
  <text x="395" y="279" text-anchor="middle" class="label">parseHtmlDocument</text>
  <text x="395" y="305" text-anchor="middle" class="detail">HTML → 문서 모델</text>

  <rect x="40" y="245" width="190" height="92" class="store"/>
  <text x="135" y="279" text-anchor="middle" class="label">Builder editor store</text>
  <text x="135" y="305" text-anchor="middle" class="detail">문서 교체 · dirty 설정</text>

  <path d="M560 291 H500" class="flow"/>
  <path d="M290 291 H230" class="flow"/>

  <rect x="40" y="395" width="190" height="92" class="box"/>
  <text x="135" y="429" text-anchor="middle" class="label">iframe Preview</text>
  <text x="135" y="455" text-anchor="middle" class="detail">srcdoc 재렌더링</text>
  <path d="M135 337 V395" class="flow"/>

  <text x="40" y="544" class="title">요청 취소</text>
  <rect x="205" y="515" width="260" height="84" class="cancel"/>
  <text x="335" y="547" text-anchor="middle" class="label">Stop · 화면 이동 확인</text>
  <text x="335" y="573" text-anchor="middle" class="detail">cancelRequest()</text>

  <rect x="535" y="515" width="225" height="84" class="cancel"/>
  <text x="647" y="547" text-anchor="middle" class="label">AbortController</text>
  <text x="647" y="573" text-anchor="middle" class="detail">공유 중인 요청 중단</text>

  <rect x="830" y="515" width="280" height="84" class="cancel"/>
  <text x="970" y="547" text-anchor="middle" class="label">client fetch · server fetch</text>
  <text x="970" y="573" text-anchor="middle" class="detail">abort signal 전파</text>

  <path d="M465 557 H535" class="cancel-flow"/>
  <path d="M760 557 H830" class="cancel-flow"/>
  <text x="500" y="542" text-anchor="middle" class="cancel-note">abort</text>
  <text x="795" y="542" text-anchor="middle" class="cancel-note">signal</text>

  <rect x="1035" y="85" width="165" height="252" rx="12" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="1117" y="120" text-anchor="middle" class="label">요청 중 UI</text>
  <text x="1055" y="157" class="detail">• 편집 body dim</text>
  <text x="1055" y="188" class="detail">• loading spinner</text>
  <text x="1055" y="219" class="detail">• Send → Stop</text>
  <text x="1055" y="250" class="detail">• 패널 전환 잠금</text>
  <text x="1055" y="281" class="detail">• 이동 확인창</text>
  <text x="1055" y="312" class="detail">• 채팅 조작 유지</text>
</svg>
